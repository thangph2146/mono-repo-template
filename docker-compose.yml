# StoreSync: API + Postgres + 2 Next.js (storefront :3000, admin :3001).
# Trình duyệt trên máy host luôn gọi API qua cổng đã publish (localhost:3002),
# không dùng hostname dịch vụ Docker (api) trong NEXT_PUBLIC_*.
services:
  postgres:
    image: postgres:16-alpine
    container_name: store-sync-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-storesync}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-storesync}
      POSTGRES_DB: ${POSTGRES_DB:-storesync}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-storesync} -d ${POSTGRES_DB:-storesync}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - store-sync-net

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: store-sync-api
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3002
      SERVICE_NAME: "@api"
      DATABASE_URL: postgresql://${POSTGRES_USER:-storesync}:${POSTGRES_PASSWORD:-storesync}@postgres:5432/${POSTGRES_DB:-storesync}
      DB_DEBUG: "false"
      CORS_ORIGINS: http://localhost:3000,http://localhost:3001
    ports:
      - "3002:3002"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "wget -qO- http://127.0.0.1:3002/api/health | grep -q ok || exit 1",
        ]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 45s
    networks:
      - store-sync-net

  backend:
    build:
      context: .
      dockerfile: apps/backend/Dockerfile
      args:
        NEXT_PUBLIC_API_URL: http://localhost:3002/api
        NEXT_PUBLIC_ADMIN_URL: ""
        NEXT_PUBLIC_BACKEND_BASE_PATH: /admin
        NEXT_PUBLIC_TRAILING_SLASH: "false"
    container_name: store-sync-backend
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3001
    ports:
      - "3001:3001"
    depends_on:
      api:
        condition: service_healthy
    networks:
      - store-sync-net

  frontend:
    build:
      context: .
      dockerfile: apps/frontend/Dockerfile
      args:
        NEXT_PUBLIC_API_URL: http://localhost:3002/api
        NEXT_PUBLIC_ADMIN_URL: http://localhost:3001
        NEXT_PUBLIC_SITE_URL: ""
    container_name: store-sync-frontend
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3000
    ports:
      - "3000:3000"
    depends_on:
      api:
        condition: service_healthy
    networks:
      - store-sync-net

networks:
  store-sync-net:
    driver: bridge

volumes:
  postgres-data:

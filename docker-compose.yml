# StoreSync: API + MySQL + 2 Next.js (storefront :3000, admin :3001).
# Trình duyệt trên máy host luôn gọi API qua cổng đã publish (localhost:3002),
# không dùng hostname dịch vụ Docker (api) trong NEXT_PUBLIC_*.
services:
  mysql:
    image: mysql:8.0
    container_name: store-sync-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-storesync}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-hub_parent}
      MYSQL_USER: ${MYSQL_USER:-storesync}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-storesync}
    ports:
      - "${MYSQL_PORT:-3306}:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -u root -p${MYSQL_ROOT_PASSWORD:-storesync} | grep 'mysqld is alive' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - store-sync-net

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: store-sync-api
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3002
      SERVICE_NAME: "@api"
      API_PREFIX: api
      DB_TYPE: mysql
      DATABASE_URL: mysql://root:${MYSQL_ROOT_PASSWORD:-storesync}@mysql:3306/${MYSQL_DATABASE:-hub_parent}
      DB_DEBUG: "false"
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3000,http://localhost:3001}
      EXTERNAL_API_URL: ${EXTERNAL_API_URL:-}
      BACKUP_IMPORT_SECRET: ${BACKUP_IMPORT_SECRET:-}
    ports:
      - "3002:3002"
    depends_on:
      mysql:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "wget -qO- http://127.0.0.1:3002/api/health | grep -q ok || exit 1",
        ]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 45s
    networks:
      - store-sync-net

  backend:
    build:
      context: .
      dockerfile: apps/backend/Dockerfile
      args:
        NEXT_PUBLIC_API_URL: http://localhost:3002/api
        NEXT_PUBLIC_ADMIN_URL: http://localhost:3001
        NEXT_PUBLIC_BACKEND_BASE_PATH: /admin
        NEXT_PUBLIC_TRAILING_SLASH: "false"
    container_name: store-sync-backend
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3001
    ports:
      - "3001:3001"
    depends_on:
      api:
        condition: service_healthy
    networks:
      - store-sync-net

  frontend:
    build:
      context: .
      dockerfile: apps/frontend/Dockerfile
      args:
        NEXT_PUBLIC_API_URL: http://localhost:3002/api
        NEXT_PUBLIC_ADMIN_URL: http://localhost:3001
        NEXT_PUBLIC_SITE_URL: http://localhost:3000
    container_name: store-sync-frontend
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3000
    ports:
      - "3000:3000"
    depends_on:
      api:
        condition: service_healthy
    networks:
      - store-sync-net

networks:
  store-sync-net:
    driver: bridge

volumes:
  mysql-data:
